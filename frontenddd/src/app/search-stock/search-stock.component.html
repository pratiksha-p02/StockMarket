<div class="container mt-2">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10 col-12">

      <mat-form-field class="w-100">

        <!-- INPUT -->
        <input
          matInput
          [formControl]="formControl"
          [matAutocomplete]="auto"
          placeholder="Enter Stock Ticker Symbol"
          required
          (keydown.enter)="showOptions()"
          (input)="onInputChange($event)"
        />

        <!-- AUTOCOMPLETE -->
        <mat-autocomplete #auto="matAutocomplete">

          <mat-option
            *ngFor="let item of filterOptionstest | async"
            [value]="item.displaySymbol"
            (click)="directToNextComponentClick()"
          >
            {{ item.displaySymbol | uppercase }} | {{ item.description }}
          </mat-option>

          <!-- LOADING STATE -->
          <mat-option *ngIf="isLoading" disabled>
            <mat-spinner diameter="30"></mat-spinner>
          </mat-option>

        </mat-autocomplete>

        <!-- ICONS -->
        <mat-icon matSuffix (click)="directToNextComponentClick()">
          search
        </mat-icon>

        <mat-icon matSuffix (click)="clearValue()">
          close
        </mat-icon>

      </mat-form-field>

    </div>
  </div>
</div>

<!-- ERROR -->
<div class="alert alert-danger text-center mt-2" *ngIf="raiseAlert">
  Please enter a valid stock ticker
</div>
