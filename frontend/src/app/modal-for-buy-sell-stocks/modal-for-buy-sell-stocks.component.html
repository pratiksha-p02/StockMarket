<!-- Modal -->
<div class="modal show d-block" tabindex="-1" role="dialog">

  <div class="modal-dialog" role="document">
    <div class="modal-content">

      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title fs-5">{{ item }}</h5>

        <button
          type="button"
          class="btn-close"
          aria-label="Close"
          (click)="closeModal()">
        </button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <p class="fw-bold">
          Current Price: {{ item2 }}
        </p>

        <p class="fw-bold">
          Money in wallet: ${{ apitotmoney | number:'1.2-2' }}
        </p>

        <div class="mb-3">
          <label for="quantityInput" class="form-label fw-bold">
            Quantity:
          </label>

          <input
            id="quantityInput"
            type="number"
            class="form-control"
            [(ngModel)]="quantity"
            name="quantity"
            placeholder="Enter quantity"
            (input)="checkQuantity()"
          />
        </div>

        <div class="text-danger" [innerHTML]="alertforlessmoney"></div>

      </div>

      <!-- Footer -->
      <div class="modal-footer d-flex justify-content-between align-items-center">

        <div class="fw-bold">
          Total:
          <span [innerHTML]="message"></span>
        </div>

        <button
          type="button"
          class="btn btn-success"
          [disabled]="!isButtonEnabled()"
          (click)="buy()">
          Buy
        </button>

      </div>

    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="modal-backdrop show"></div>
